name: Build on Tag (Windows Only)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # Allows manual testing from Actions tab

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Core/UnityMultiplayerARPG_DatabaseManager.sln

      - name: Publish Windows x64 (Single File)
        run: dotnet publish Core/UnityMultiplayerARPG_DatabaseManager.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishTrimmed=false --output publish/windows-x64

      - name: Create ZIP
        run: |
          cd publish/windows-x64
          zip -r ../../windows-x64.zip .
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: windows-x64.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/windows-x64/windows-x64.zip
          generate_release_notes: true